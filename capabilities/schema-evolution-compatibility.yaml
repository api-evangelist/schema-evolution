naftiko: 1.0.0-alpha2
info:
  label: Confluent Schema Registry API — Compatibility
  description: 'Confluent Schema Registry API — Compatibility. 2 operations. Lead operation: Test compatibility against all
    versions. Self-contained Naftiko capability covering one Schema Evolution business surface.'
  tags:
  - Schema Evolution
  - Compatibility
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCHEMA_EVOLUTION_API_KEY: SCHEMA_EVOLUTION_API_KEY
capability:
  consumes:
  - type: http
    namespace: schema-evolution-compatibility
    baseUri: https://your-schema-registry-host
    description: Confluent Schema Registry API — Compatibility business capability. Self-contained, no shared references.
    resources:
    - name: compatibility-subjects-subject-versions
      path: /compatibility/subjects/{subject}/versions
      operations:
      - name: post
        method: POST
        description: Test compatibility against all versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: compatibility-subjects-subject-versions-version
      path: /compatibility/subjects/{subject}/versions/{version}
      operations:
      - name: post
        method: POST
        description: Test compatibility against a specific version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: schema-evolution-compatibility-rest
    port: 8080
    description: REST adapter for Confluent Schema Registry API — Compatibility. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/compatibility/subjects/{subject}/versions
      name: compatibility-subjects-subject-versions
      description: REST surface for compatibility-subjects-subject-versions.
      operations:
      - method: POST
        name: post
        description: Test compatibility against all versions
        call: schema-evolution-compatibility.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/compatibility/subjects/{subject}/versions/{version}
      name: compatibility-subjects-subject-versions-version
      description: REST surface for compatibility-subjects-subject-versions-version.
      operations:
      - method: POST
        name: post
        description: Test compatibility against a specific version
        call: schema-evolution-compatibility.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: schema-evolution-compatibility-mcp
    port: 9090
    transport: http
    description: MCP adapter for Confluent Schema Registry API — Compatibility. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: test-compatibility-against-all-versions
      description: Test compatibility against all versions
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: schema-evolution-compatibility.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: test-compatibility-against-specific-version
      description: Test compatibility against a specific version
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: schema-evolution-compatibility.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
